<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADD STUDENT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
    <nav>
        <a href="Dashboard.html">DASHBOARD</a>
        <a href="view_students.html">VIEW STUDENTS</a>
        <a href="logout.html">LOGOUT</a>
    </nav>
    </div>
    <br><br>
    <h2>ADD STUDENT</h2>
    <form id="student_form" onSubmit="return add(event)">
        <label for="student_name">Student Name:</label>
        <input type="text" id="student_name" name="student_name" required>
        <br><br>

       
        <label for="roll_no">Roll No:</label>
        <input type="text" id="roll_no" name="roll_no" required>
        <br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required>
        <br><br>

        <label for="cgpa">CGPA:</label>
        <input type="number" id="cgpa" name="cgpa" step="0.01" required>
        <br><br>

        <button type="submit">Add Student</button>

    </form>
    <script>
        //add functionality for unique roll number
        function add(event) {
            event.preventDefault();
            const student={
                name: document.getElementById("student_name").value,
                rollNo: document.getElementById("roll_no").value,
                age: document.getElementById("age").value,
                cgpa: document.getElementById("cgpa").value
            };
            let students=JSON.parse(localStorage.getItem("students")) || [];
            const existingStudent = students.find(s => s.rollNo === student.rollNo);
            if(existingStudent){
                alert("Roll No already exists. Please use a unique Roll No.");
                return;
            }
            students.push(student);
            localStorage.setItem("students", JSON.stringify(students));
            alert("Student added successfully!");
            document.getElementById("student_form").reset();
        }   
    </script>
</body>
</html>
