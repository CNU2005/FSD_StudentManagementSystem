<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Edit Student</h2>

    <form id="studentForm" onsubmit="update()">

        <label>Student Name:</label>
        <input type="text" id="student_name" required>
        <br><br>

        <label>Roll No:</label>
        <input type="text" id="roll_no" required>
        <br><br>
        
        <label>Age:</label>
        <input type="number" id="age" required>
        <br><br>

        <label>CGPA:</label>
        <input type="number" step="0.01" id="cgpa" required>
        <br><br>

        <button type="submit">Update Student</button>

    </form>

    <script>
        let stdid;
        window.onload=async function() {
        const params = new URLSearchParams(window.location.search); 
        const oldRollNo = params.get("rollNo");
        const response = await fetch("http://localhost:3000/students");
        const students = await response.json();

        const std = students.find(
            s => s.rollNo === oldRollNo
        );

        if (std) {
            stdid=std.id;
            document.getElementById("student_name").value=std.name;
            document.getElementById("roll_no").value=std.rollNo;
            document.getElementById("age").value=std.age;
            document.getElementById("cgpa").value=std.cgpa;
        }
        else{
            alert("Student Not Found");
        }
    }
    async function update(){
        const updatedStudent = {
            name: document.getElementById("student_name").value,
            rollNo: document.getElementById("roll_no").value,
            age: document.getElementById("age").value,
            cgpa: document.getElementById("cgpa").value
            };

            await fetch(`http://localhost:3000/students/${stdid}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(updatedStudent)
            });

            alert("Student updated successfully!");
            window.location.href = "view_students.html";
        }
    

    </script>

</body>
</html>
