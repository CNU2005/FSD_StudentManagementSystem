<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Edit Student</h2>

    <form id="studentForm">

        <label>Student Name:</label>
        <input type="text" id="student_name" required>
        <br><br>

        <label>Roll No:</label>
        <input type="text" id="roll_no" required>
        <br><br>

        <label>Age:</label>
        <input type="number" id="age" required>
        <br><br>

        <label>CGPA:</label>
        <input type="number" step="0.01" id="cgpa" required>
        <br><br>

        <button type="submit">Update Student</button>

    </form>

    <script>

        const params = new URLSearchParams(window.location.search);
        const oldRollNo = params.get("rollNo");

        let students = JSON.parse(localStorage.getItem("students")) || [];

        const student = students.find(
            s => s.rollNo === oldRollNo
        );

        if (student) {

            document.getElementById("student_name").value = student.name;
            document.getElementById("roll_no").value = student.rollNo;
            document.getElementById("age").value = student.age;
            document.getElementById("cgpa").value = student.cgpa;

        } else {

            alert("Student not found!");
            window.location.href = "view_students.html";

        }

        document
            .getElementById("studentForm")
            .addEventListener("submit", function(event) {

            event.preventDefault();

            const updatedStudent = {

                name: document.getElementById("student_name").value,
                rollNo: document.getElementById("roll_no").value,
                age: document.getElementById("age").value,
                cgpa: document.getElementById("cgpa").value

            };

            const index = students.findIndex(
                s => s.rollNo === oldRollNo
            );

            if (index !== -1) {

                students[index] = updatedStudent;

                localStorage.setItem(
                    "students",
                    JSON.stringify(students)
                );

                alert("Student updated successfully!");

                window.location.href = "view_students.html";
            }
        });

    </script>

</body>
</html>
