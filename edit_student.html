<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit student</title>
</head>
<body>
    <nav>
        <a href="Dashboard.html">DASHBOARD</a>
        <a href="view_students.html">VIEW STUDENTS</a>
        <a href="logout.html">LOGOUT</a>
    </nav>
    <br><br>
    <h2>Edit Student</h2>
    <form action="view_students.html" method="POST">
        <label for="student_name">Student Name:</label>
        <input type="text" id="student_name" name="student_name" value="John Doe" required>
        <br><br>

        <label for="roll_no">Roll No:</label>
        <input type="text" id="roll_no" name="roll_no" value="101" required>
        <br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" value="20" required>
        <br><br>

        <label for="cgpa">CGPA:</label>
        <input type="number" id="cgpa" name="cgpa" step="0.01" value="8.5" required>
        <br><br>

        <button type="submit">Update Student</button>
    </form>
</body>
</html>
