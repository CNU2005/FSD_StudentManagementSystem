<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
        <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
     <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
       
    </nav>
    </div>
    <h2>Registration Form</h2>
    <br><br>
    <form onSubmit="return validate(event)">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>
        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
        <br><br>

        <button type="submit">Register</button>
        <br><br>
        <a href="login.html">Already have an account? Login here</a>
    </form>
    <script>
        async function validate(event) {
            event.preventDefault();
            var password = document.getElementById("password").value;
            var confirmPassword = document.getElementById("confirm_password").value;


            if (password !== confirmPassword) {
                alert("Passwords do not match. Please try again.");
                return false; 
            }
            else{
                if(password.match(/^[A-Z][a-zA-Z0-9@*_]{7,}$/) === null){
                    alert("Password must be at least 8 characters long and start with an uppercase letter.");
                    return false;
                }
                else{
                const userobject = {
                    username: document.getElementById("username").value,
                    password: password
                };
                const usersdata=await fetch("http://localhost:3000/users");
                const users=await usersdata.json();
                if(users.some(s=>s.username===userobject.username))
                {
                    alert("User already exist");
                    return false;
                }
                var res=await fetch("http://localhost:3000/users",{method:"post",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(userobject)

                });

            }
            }
            alert("User Registered successfully");
            window.location.href="login.html";
            
        }
    </script>

</body>
</html>
