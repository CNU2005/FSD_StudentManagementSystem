<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <div class="card mx-auto shadow" style="max-width: 600px;">

            <div class="card-header text-center">
                <h2>Weather App</h2>
            </div>

            <div class="card-body">

                <label class="form-label">Enter City Name</label>

                <input
                    type="text"
                    id="city"
                    class="form-control"
                    placeholder="e.g. Hyderabad"
                >

                <div class="mt-3 d-flex gap-2 justify-content-center">

                    <button
                        class="btn btn-primary"
                        onclick="getCurrentWeather()"
                    >
                        Current Weather
                    </button>

                    <button
                        class="btn btn-success"
                        onclick="getForecast()"
                    >
                        3-Day Forecast
                    </button>

                </div>

            </div>

            <div class="card-body" id="output"></div>

            <div class="card-body" id="forecastOutput"></div>

        </div>

    </div>

    <script>

        const API_KEY = "7ff67255ef104dfbacd34335260501";

        async function getCurrentWeather() {

            const city = document.getElementById("city").value.trim();

            if (!city) {
                alert("Please enter a city name");
                return;
            }

            try {

                const res = await fetch(
                    `https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${city}&aqi=no`
                );

                const data = await res.json();

                document.getElementById("forecastOutput").innerHTML = "";

                document.getElementById("output").innerHTML = `
                    <div class="card mt-3">
                        <div class="card-body text-center">

                            <h3>${data.location.name}, ${data.location.country}</h3>

                            <h4 class="mt-2">
                                ${data.current.temp_c} °C
                            </h4>

                            <p>
                                <strong>Condition:</strong>
                                ${data.current.condition.text}
                            </p>

                            <p>
                                <strong>Humidity:</strong>
                                ${data.current.humidity}%
                            </p>

                            <p>
                                <strong>Wind Speed:</strong>
                                ${data.current.wind_kph} km/h
                            </p>

                        </div>
                    </div>
                `;

            } catch (error) {

                document.getElementById("output").innerHTML =
                    `<div class="alert alert-danger">Unable to fetch weather data.</div>`;

                console.error(error);
            }
        }

        async function getForecast() {

            const city = document.getElementById("city").value.trim();

            if (!city) {
                alert("Please enter a city name");
                return;
            }

            try {

                const res = await fetch(
                    `https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${city}&days=3&aqi=no&alerts=no`
                );

                const data = await res.json();

                document.getElementById("output").innerHTML = `
                    <h4 class="text-center">
                        ${data.location.name}, ${data.location.country}
                    </h4>
                `;

                let forecastHTML = `
                    <h3 class="text-center mt-3">
                        3-Day Forecast
                    </h3>
                `;

                data.forecast.forecastday.forEach(day => {

                    forecastHTML += `
                        <div class="card mt-3">
                            <div class="card-body text-center">

                                <h5>${day.date}</h5>

                                <p>
                                    <strong>Condition:</strong>
                                    ${day.day.condition.text}
                                </p>

                                <p>
                                    <strong>Max Temp:</strong>
                                    ${day.day.maxtemp_c} °C
                                </p>

                                <p>
                                    <strong>Min Temp:</strong>
                                    ${day.day.mintemp_c} °C
                                </p>

                                <p>
                                    <strong>Humidity:</strong>
                                    ${day.day.avghumidity}%
                                </p>

                            </div>
                        </div>
                    `;
                });

                document.getElementById("forecastOutput").innerHTML = forecastHTML;

            } catch (error) {

                document.getElementById("forecastOutput").innerHTML =
                    `<div class="alert alert-danger">Unable to fetch forecast data.</div>`;

                console.error(error);
            }
        }

    </script>

</body>
</html>
