<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Edit Student</h2>

    <form id="studentForm" onsubmit="update(event)">

        <label>Student Name:</label>
        <input type="text" id="student_name" required>
        <br><br>

        <label>Roll No:</label>
        <input type="text" id="roll_no" required>
        <br><br>
        
        <label>Age:</label>
        <input type="number" id="age" required>
        <br><br>

        <label>CGPA:</label>
        <input type="number" step="0.01" id="cgpa" required>
        <br><br>

        <button type="submit">Update Student</button>

    </form>
        <script>
let stdid;

window.onload = async function () {

    const params = new URLSearchParams(window.location.search);
    const oldRollno = params.get("rollno");

    console.log(window.location.search);
    console.log(oldRollno);

    const response = await fetch(
        "http://localhost:8080/std_students"
    );

    const students = await response.json();
    console.log(students);

    const std = students.find(
        s => s.rollno === oldRollno
    );

    console.log(std);

    if (std) {
        stdid = std.id;

        document.getElementById("student_name").value = std.name;
        document.getElementById("roll_no").value = std.rollno;
        document.getElementById("age").value = std.age;
        document.getElementById("cgpa").value = std.cgpa;
    } else {
        alert("Student Not Found");
    }
};

async function update(event) {
    event.preventDefault();

    const updatedStudent = {
        name: document.getElementById("student_name").value,
        rollno: document.getElementById("roll_no").value,
        age: parseInt(document.getElementById("age").value),
        cgpa: parseFloat(document.getElementById("cgpa").value)
    };

    await fetch(
        `http://localhost:8080/std_students/${stdid}`,
        {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(updatedStudent)
        }
    );

    alert("Student Updated");
    window.location.href = "view_students.html";
}
</script>
    </body>
</html>
